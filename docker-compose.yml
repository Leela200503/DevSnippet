version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: devsnippet-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: devsnippet_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - devsnippet-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    image: openjdk:17-jdk-slim
    container_name: devsnippet-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devsnippet_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_password
    command: sh -c "cd /app && mvn spring-boot:run"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - devsnippet-network

  # React Frontend (using Node)
  frontend:
    image: node:18-alpine
    container_name: devsnippet-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - devsnippet-network

volumes:
  mysql_data:

networks:
  devsnippet-network:
    driver: bridge
