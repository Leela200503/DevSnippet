# Spring Boot Application Configuration
spring.application.name=DevSnippet

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/devsnippet_db
spring.datasource.username=root
spring.datasource.password=Leela@2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# JWT Configuration
app.jwt.secret=your_super_secret_jwt_key_min_256_bits_long_change_this_in_production
app.jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.devsnippet=DEBUG

# CORS Configuration
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.max-age=3600
